services:
  - type: web
    name: lukeros-web
    env: node
    plan: free
    rootDir: apps/web
    buildCommand: npm install --prefix ../.. && npm install && echo "build done"
    startCommand: node server.js
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 18
    - key: CRM_HOSTPORT
        fromService:
          type: web
          name: lukeros-crm
      property: hostport
      - key: OTP_BYPASS
        value: "1" # remove in production
      - key: DEV_OTP_CODE
        value: "123456" # remove in production
      - key: DEFAULT_COUNTRY_CODE
        value: "+57"

  - type: web
    name: lukeros-crm
    env: node
    plan: free
    rootDir: apps/crm
    buildCommand: npm install --prefix ../.. && npm install && echo "build done"
    startCommand: node index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: lukeros-db
          property: connectionString

  - type: web
    name: lukeros-api
    env: node
    plan: free
    rootDir: apps/api
    buildCommand: npm install --prefix ../.. && npm install && echo "build done"
    startCommand: node index.js
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 18
    - key: CRM_HOSTPORT
        fromService:
          type: web
          name: lukeros-crm
      property: hostport

databases:
  - name: lukeros-db
    plan: free
