<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pago Exitoso - Lukeros</title>
  <style>
    :root { 
      --primary: #1E4FB3; 
      --accent: #F6C945;
      --white: #fff; 
      --black: #000; 
      --success: var(--primary);
    }
    * { box-sizing: border-box; }
    body { 
      font-family: 'Nunito', system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, "Helvetica Neue", Arial, "Noto Sans"; 
      margin: 0; 
      color: var(--black); 
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      padding: 48px 32px;
      max-width: 600px;
      width: 100%;
      text-align: center;
      animation: slideUp 0.5s ease-out;
    }
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .icon-container {
      margin: 0 auto 24px;
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: scaleIn 0.6s ease-out 0.2s both;
    }
    @keyframes scaleIn {
      from {
        transform: scale(0);
      }
      to {
        transform: scale(1);
      }
    }
    .checkmark {
      width: 60px;
      height: 60px;
      border: 4px solid white;
      border-radius: 50%;
      position: relative;
    }
    .checkmark::after {
      content: '';
      position: absolute;
      left: 18px;
      top: 8px;
      width: 16px;
      height: 28px;
      border: solid white;
      border-width: 0 4px 4px 0;
      transform: rotate(45deg);
    }
    h1 {
      font-family: 'Playfair Display', serif;
      color: var(--success);
      font-size: 2.5rem;
      margin: 0 0 16px 0;
      font-weight: 800;
    }
    .message {
      font-size: 1.25rem;
      line-height: 1.6;
      color: #555;
      margin: 0 0 32px 0;
    }
    .info-box {
      background: #f5f7fa;
      border-radius: 12px;
      padding: 24px;
      margin: 24px 0;
      border-left: 4px solid var(--accent);
    }
    .info-box p {
      margin: 0;
      font-size: 1rem;
      color: #333;
      line-height: 1.6;
    }
    .info-box strong {
      color: var(--primary);
    }
    .btn {
      display: inline-block;
      padding: 16px 32px;
      background: var(--primary);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1.1rem;
      transition: all 0.3s ease;
      margin-top: 16px;
    }
    .btn:hover {
      background: #173B86;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(30, 79, 179, 0.3);
    }
    .brand {
      font-family: 'Playfair Display', serif;
      color: var(--primary);
      font-size: 1.5rem;
      font-weight: 800;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 2px solid #eee;
    }
    @media (max-width: 600px) {
      .container {
        padding: 32px 24px;
      }
      h1 {
        font-size: 2rem;
      }
      .message {
        font-size: 1.1rem;
      }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="icon-container">
      <div class="checkmark"></div>
    </div>
    
    <h1>¡Pago Exitoso!</h1>
    
    <p class="message">
      Gracias por tu pago
    </p>
    
    <div class="info-box">
      <p>
        <strong>¡Buenas noticias!</strong><br>
        En los próximos minutos tendrás un crédito nuevo disponible para solicitar.
      </p>
    </div>
    
    <div class="info-box">
      <p>
        📱 Recibirás una notificación cuando tu nuevo crédito esté listo.<br>
        💳 Podrás solicitarlo inmediatamente desde tu cuenta.
      </p>
    </div>
    
    <a href="/" class="btn">Volver al inicio</a>
    
    <div class="brand">Lukeros</div>
  </div>
  
  <script>
    // Auto-redirect después de 30 segundos
    setTimeout(() => {
      window.location.href = '/';
    }, 30000);
  </script>
</body>
</html>
